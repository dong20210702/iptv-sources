name: Auto Sync Fork Only
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream, keep workflows (Smart Sync)
        run: |
          git remote add upstream https://github.com/whyun-pages/iptv-sources.git
          git fetch upstream
          
          # 核心逻辑：对比本地和上游的最新提交哈希
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          
          if [ "$LOCAL" = "$UPSTREAM" ]; then
              echo "✅ 上游没有更新，跳过同步..."
              exit 0
          fi
          
          echo "🔄 检测到上游更新，开始同步..."
          
          # 备份 workflows
          mkdir -p /tmp/my_workflows
          cp -r .github/workflows/* /tmp/my_workflows/ 2>/dev/null || true
          
          # 强制同步上游
          git checkout main
          git reset --hard upstream/main
          
          # 恢复 workflows
          mkdir -p .github/workflows
          cp -r /tmp/my_workflows/* .github/workflows/ 2>/dev/null || true
          
          # 提交并推送
          git add .github/workflows/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync upstream" || true
          git push origin main --force
